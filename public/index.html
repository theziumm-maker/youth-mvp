<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Youth — 오늘이 가장 젊은 당신</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B4CE6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Youth">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
  :root{
    --violet:#5B4CE6;
    --violet-deep:#3D31B8;
    --violet-soft:#EDEAFE;
    --lavender:#F5F3FC;
    --ink:#1D1B2E;
    --ink-soft:#6E6A85;
    --line:#E5E1F2;
    --card:#FFFFFF;
    --good:#1FA97A;
    --warn:#E08A2E;
    --radius:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:#DDD9EF;
    color:var(--ink);
    display:flex;justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    width:100%;max-width:430px;min-height:100dvh;
    background:var(--lavender);
    display:flex;flex-direction:column;
    position:relative;overflow:hidden;
  }
  main{flex:1;overflow-y:auto;padding:20px 18px 96px}

  /* ---------- 공통 ---------- */
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--violet);text-transform:uppercase;margin-bottom:6px}
  h1{font-size:22px;font-weight:800;letter-spacing:-.02em}
  h2{font-size:16px;font-weight:700;margin-bottom:10px}
  .sub{font-size:13px;color:var(--ink-soft);line-height:1.5}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    width:100%;padding:15px;border:none;border-radius:14px;
    background:var(--violet);color:#fff;font-size:15px;font-weight:700;
    font-family:inherit;cursor:pointer;transition:transform .08s ease, background .15s;
  }
  .btn:active{transform:scale(.98)}
  .btn:disabled{background:#B8B2DE;cursor:not-allowed}
  .btn.ghost{background:var(--violet-soft);color:var(--violet-deep)}
  .empty{
    text-align:center;padding:44px 20px;color:var(--ink-soft);font-size:14px;line-height:1.6;
  }
  .empty .big{font-size:34px;margin-bottom:10px}

  /* ---------- 탭바 ---------- */
  nav{
    position:absolute;bottom:0;left:0;right:0;
    background:rgba(255,255,255,.92);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);
    display:flex;padding:8px 8px calc(10px + env(safe-area-inset-bottom));
    z-index:50;
  }
  nav button{
    flex:1;background:none;border:none;font-family:inherit;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    font-size:11px;font-weight:600;color:var(--ink-soft);padding:6px 0;border-radius:12px;
  }
  nav button.on{color:var(--violet)}
  nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

  /* ---------- 홈 ---------- */
  .score-ring{position:relative;width:150px;height:150px;margin:8px auto 4px}
  .score-ring svg{transform:rotate(-90deg)}
  .score-ring .val{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .score-ring .val b{font-size:40px;font-weight:800;letter-spacing:-.03em}
  .score-ring .val span{font-size:12px;color:var(--ink-soft)}
  .delta{font-size:13px;font-weight:700}
  .delta.up{color:var(--good)} .delta.down{color:var(--warn)} .delta.flat{color:var(--ink-soft)}
  .recent-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
  .recent-strip .thumb{
    flex:0 0 72px;text-align:center;font-size:11px;color:var(--ink-soft);
  }
  .recent-strip img{
    width:72px;height:72px;object-fit:cover;border-radius:12px;border:1px solid var(--line);display:block;margin-bottom:4px;
    background:var(--violet-soft);
  }
  .streak{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-soft)}
  .streak b{color:var(--violet);font-size:18px}

  /* ---------- 촬영 ---------- */
  .cam-wrap{
    position:relative;width:100%;aspect-ratio:3/4;border-radius:20px;overflow:hidden;
    background:#14121F;margin-bottom:14px;
  }
  .cam-wrap video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
  .cam-wrap .guide{position:absolute;inset:0;pointer-events:none}
  .cam-hint{
    position:absolute;bottom:56px;left:0;right:0;text-align:center;
    color:rgba(255,255,255,.95);font-size:15px;font-weight:700;
    text-shadow:0 1px 8px rgba(0,0,0,.6);transition:color .2s;
  }
  .cam-hint.progress{color:#C5BDFF}
  #ticks line{stroke:rgba(255,255,255,.22);transition:stroke .3s ease}
  #ticks line.lit{stroke:#8B7FF5}
  #ticks.done line{stroke:#5CE6B0}
  .flash{
    position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;
    transition:opacity .12s ease;
  }
  .flash.on{opacity:.85}
  .cand-label{font-size:12px;color:var(--ink-soft);margin-bottom:8px;text-align:center}
  .cand-strip{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
  .cand-strip img{
    width:56px;height:56px;border-radius:12px;object-fit:cover;
    border:2.5px solid transparent;opacity:.55;cursor:pointer;
    transition:all .15s ease;
  }
  .cand-strip img.sel{border-color:var(--violet);opacity:1;transform:scale(1.06)}
  .gates{
    position:absolute;bottom:12px;left:12px;right:12px;
    display:flex;gap:8px;justify-content:center;
  }
  .gate{
    font-size:12px;font-weight:700;padding:6px 12px;border-radius:99px;
    background:rgba(20,18,31,.72);color:#9A94B8;backdrop-filter:blur(6px);
    display:flex;align-items:center;gap:5px;
  }
  .gate.ok{color:#5CE6B0}
  .gate .dot{width:7px;height:7px;border-radius:99px;background:currentColor}
  .cam-fallback{padding:24px;text-align:center;color:#B8B2DE;font-size:13px;line-height:1.6;
    position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
  .cam-fallback.show{display:flex}
  .cam-fallback label{
    display:inline-block;padding:12px 22px;border-radius:12px;background:var(--violet);color:#fff;
    font-weight:700;font-size:14px;cursor:pointer;
  }
  .review{display:none}
  .review.show{display:block}
  .review img{width:100%;border-radius:20px;margin-bottom:14px}
  .metric-preview{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .metric-preview .mp{
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;
  }
  .mp .k{font-size:11px;color:var(--ink-soft);margin-bottom:2px}
  .mp .v{font-size:18px;font-weight:800}
  .row2{display:flex;gap:10px}
  .row2 .btn{flex:1}

  /* ---------- 분석 ---------- */
  .metric-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto}
  .metric-tabs button{
    flex:0 0 auto;padding:8px 14px;border-radius:99px;border:1px solid var(--line);
    background:var(--card);font-family:inherit;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;
  }
  .metric-tabs button.on{background:var(--violet);border-color:var(--violet);color:#fff}
  .chart-head{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
  .chart-head b{font-size:30px;font-weight:800}
  .chart-head span{font-size:12px;color:var(--ink-soft)}
  .chart-svg{width:100%;height:150px;display:block}
  .axis-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-soft);margin-top:6px}
  .note{font-size:11.5px;color:var(--ink-soft);line-height:1.55;margin-top:10px;
    background:var(--violet-soft);border-radius:10px;padding:10px 12px}

  /* ---------- 전후 ---------- */
  .compare-picks{display:flex;gap:10px;align-items:center;margin-bottom:14px}
  .compare-picks select{
    flex:1;padding:11px 12px;border-radius:12px;border:1px solid var(--line);
    font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--card);
  }
  .compare-picks .arrow{color:var(--ink-soft);font-weight:700}
  .compare-stage{
    position:relative;width:100%;aspect-ratio:1/1;border-radius:20px;overflow:hidden;
    background:#14121F;margin-bottom:10px;user-select:none;
  }
  .compare-stage img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .compare-stage .after-clip{clip-path:inset(0 0 0 50%)}
  .compare-stage .handle{
    position:absolute;top:0;bottom:0;left:50%;width:2px;background:#fff;
    box-shadow:0 0 10px rgba(0,0,0,.4);
  }
  .compare-stage .handle::after{
    content:'⇔';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:36px;height:36px;border-radius:99px;background:#fff;color:var(--violet-deep);
    display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;
  }
  .compare-stage .lbl{
    position:absolute;top:10px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;
    background:rgba(20,18,31,.7);color:#fff;
  }
  .compare-stage .lbl.a{left:10px}.compare-stage .lbl.b{right:10px}
  .compare-range{width:100%;margin-bottom:14px;accent-color:var(--violet)}
  .delta-list .dl{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 0;border-bottom:1px solid var(--line);font-size:14px;
  }
  .delta-list .dl:last-child{border-bottom:none}
  .dl b{font-weight:700}
  .toast{
    position:absolute;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-size:13px;font-weight:600;
    padding:11px 18px;border-radius:99px;opacity:0;pointer-events:none;
    transition:all .25s ease;z-index:99;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- 홈 화면 설치 안내 ---------- */
  .install-banner{
    display:none;align-items:center;gap:12px;
    background:var(--violet);color:#fff;border-radius:var(--radius);
    padding:14px 16px;margin-bottom:14px;
  }
  .install-banner.show{display:flex}
  .install-banner .ib-icon{
    width:40px;height:40px;border-radius:11px;background:#fff;flex:0 0 40px;
    display:flex;align-items:center;justify-content:center;
    color:var(--violet);font-weight:800;font-size:20px;
  }
  .install-banner .ib-text{flex:1;font-size:13px;line-height:1.4}
  .install-banner .ib-text b{display:block;font-size:14px}
  .install-banner button{
    border:none;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;
    padding:9px 14px;border-radius:10px;background:#fff;color:var(--violet-deep);
  }
  .install-banner .ib-close{
    background:none;color:rgba(255,255,255,.7);padding:6px;font-size:16px;
  }
  .ios-modal{
    position:absolute;inset:0;z-index:200;display:none;
    align-items:flex-end;justify-content:center;
    background:rgba(29,27,46,.5);
  }
  .ios-modal.show{display:flex}
  .ios-sheet{
    width:100%;background:#fff;border-radius:22px 22px 0 0;
    padding:24px 22px calc(24px + env(safe-area-inset-bottom));
  }
  .ios-sheet h3{font-size:17px;font-weight:800;margin-bottom:6px}
  .ios-sheet p{font-size:13px;color:var(--ink-soft);margin-bottom:16px;line-height:1.5}
  .ios-step{
    display:flex;align-items:center;gap:12px;padding:12px 0;
    border-bottom:1px solid var(--line);font-size:14px;line-height:1.45;
  }
  .ios-step:last-of-type{border-bottom:none}
  .ios-step .n{
    flex:0 0 26px;height:26px;border-radius:99px;background:var(--violet-soft);
    color:var(--violet-deep);font-weight:800;font-size:13px;
    display:flex;align-items:center;justify-content:center;
  }
  .ios-step .share-ico{
    display:inline-block;vertical-align:-3px;width:17px;height:17px;
    stroke:var(--violet);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
  }
  .ios-sheet .btn{margin-top:18px}
  @media (prefers-reduced-motion: reduce){
    *{transition:none!important;animation:none!important}
  }
</style>
</head>

<script type="module">
/* MediaPipe 얼굴 인식 엔진 — 페이지 로드와 동시에 백그라운드로 준비 */
(async () => {
  try {
    const { FaceLandmarker, FilesetResolver } =
      await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14');
    const fileset = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
    const opts = (delegate) => ({
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
        delegate
      },
      runningMode: 'VIDEO',
      numFaces: 1
    });
    try {
      window.faceLm = await FaceLandmarker.createFromOptions(fileset, opts('GPU'));
    } catch (e) {
      window.faceLm = await FaceLandmarker.createFromOptions(fileset, opts('CPU'));
    }
  } catch (e) {
    console.warn('얼굴 인식 엔진 로드 실패 — 기본 촬영 모드로 동작합니다', e);
  }
})();
</script>

    </button>

<script>
/* =========================================================
   Youth MVP — 서버 연동 버전
   기록은 서버(PostgreSQL)에 저장되고, 기기 UUID로 사용자를 구분합니다.
   지표는 촬영 이미지의 픽셀 통계에서 계산되는 근사치이며,
   의학적 진단이 아닌 변화 추적 참고용입니다.
========================================================= */

const S = 512; // 정규화 저장 해상도

/* ---------- 사용자 식별 (기기 UUID) ---------- */
const userId = (() => {
  let u = localStorage.getItem('youth_uid');
  if (!u) {
    u = (crypto.randomUUID ? crypto.randomUUID()
        : 'u-' + Date.now() + '-' + Math.random().toString(36).slice(2));
    localStorage.setItem('youth_uid', u);
  }
  return u;
})();

/* ---------- 서버 API ---------- */
let entries = []; // [{id, ts, dateKey, metrics}]

async function loadIndex(){
  try{
    const r = await fetch('/api/records?userId=' + encodeURIComponent(userId));
    if(!r.ok) throw new Error();
    const rows = await r.json();
    entries = rows.map(row => {
      const ts = new Date(row.takenAt).getTime();
      return { id: row.id, ts, dateKey: dateKey(ts), metrics: row.metrics };
    }).sort((a,b)=>a.ts-b.ts);
  }catch(e){
    entries = [];
    toast('서버 연결에 실패했어요. 새로고침 해주세요.');
  }
}

async function saveEntryToServer(metrics, dataUrl){
  const r = await fetch('/api/records', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ userId, metrics, photoBase64: dataUrl })
  });
  if(!r.ok) throw new Error('save failed');
  const { id, takenAt } = await r.json();
  const ts = new Date(takenAt).getTime();
  entries.push({ id, ts, dateKey: dateKey(ts), metrics });
  entries.sort((a,b)=>a.ts-b.ts);
}

const photoUrl = id => '/api/photo/' + id;

/* ---------- 유틸 ---------- */
const $ = s => document.querySelector(s);
const fmtDate = ts => { const d=new Date(ts); return `${d.getMonth()+1}.${String(d.getDate()).padStart(2,'0')}`; };
const fmtFull = ts => { const d=new Date(ts); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; };
const dateKey = ts => { const d=new Date(ts); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; };
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), 2200);
}
function latestPerDay(){
  const m = new Map();
  for(const e of entries) m.set(e.dateKey, e);
  return [...m.values()];
}

/* ---------- 이미지 분석 (실제 픽셀 계산) ---------- */
function analyzeImageData(imgData){
  const {data, width:W, height:H} = imgData;
  const cx = W/2, cy = H*0.52, rx = W*0.30, ry = H*0.38;
  const inOval = (x,y)=>{ const dx=(x-cx)/rx, dy=(y-cy)/ry; return dx*dx+dy*dy <= 1; };

  let n=0, sumL=0, sumLeft=0, nLeft=0, sumRight=0, nRight=0;
  let sumRG=0, sumRB=0, sumRG2=0, sumRB2=0;
  const gw = Math.ceil(W/2), gh = Math.ceil(H/2);
  const gray = new Float32Array(gw*gh);

  for(let y=0;y<H;y+=2){
    for(let x=0;x<W;x+=2){
      const i=(y*W+x)*4;
      const r=data[i], g=data[i+1], b=data[i+2];
      const L = 0.299*r + 0.587*g + 0.114*b;
      gray[(y>>1)*gw+(x>>1)] = L;
      if(!inOval(x,y)) continue;
      n++; sumL+=L;
      if(x<cx){ sumLeft+=L; nLeft++; } else { sumRight+=L; nRight++; }
      const rg=r-g, rb=r-b;
      sumRG+=rg; sumRB+=rb; sumRG2+=rg*rg; sumRB2+=rb*rb;
    }
  }
  if(n<100) return null;

  const meanL = sumL/n;
  const balance = Math.abs((sumLeft/Math.max(nLeft,1)) - (sumRight/Math.max(nRight,1)));

  let lapSum=0, lapSum2=0, ln=0;
  for(let y=1;y<gh-1;y++){
    for(let x=1;x<gw-1;x++){
      const px = x*2, py = y*2;
      if(!inOval(px,py)) continue;
      const c = gray[y*gw+x];
      const lap = gray[(y-1)*gw+x] + gray[(y+1)*gw+x] + gray[y*gw+x-1] + gray[y*gw+x+1] - 4*c;
      lapSum+=lap; lapSum2+=lap*lap; ln++;
    }
  }
  const lapVar = ln>0 ? (lapSum2/ln - (lapSum/ln)**2) : 0;

  const rgStd = Math.sqrt(Math.max(0, sumRG2/n - (sumRG/n)**2));
  const rbStd = Math.sqrt(Math.max(0, sumRB2/n - (sumRB/n)**2));

  const bright = Math.round(Math.max(0, Math.min(100, 100 - Math.abs(meanL-130)*0.9 - balance*0.6)));
  const sharp = Math.round(Math.max(0, Math.min(100, (lapVar-20)/3.6)));
  const tone = Math.round(Math.max(0, Math.min(100, 100 - (rgStd+rbStd)*1.4)));
  const texture = Math.round(Math.max(0, Math.min(100, 100 - Math.sqrt(lapVar)*2.2 + sharp*0.25)));

  const score = Math.round(Math.max(30, Math.min(98,
    tone*0.35 + texture*0.30 + bright*0.20 + sharp*0.15
  )));

  return { score, bright, sharp, tone, texture,
           raw:{ meanL:Math.round(meanL), lapVar:Math.round(lapVar), balance:Math.round(balance) } };
}

function analyzeFromSource(source, sw, sh){
  const cv = document.createElement('canvas');
  cv.width = S; cv.height = S;
  const ctx = cv.getContext('2d', {willReadFrequently:true});
  const side = Math.min(sw, sh);
  ctx.drawImage(source, (sw-side)/2, (sh-side)/2, side, side, 0, 0, S, S);
  const metrics = analyzeImageData(ctx.getImageData(0,0,S,S));
  const dataUrl = cv.toDataURL('image/jpeg', 0.82);
  return { metrics, dataUrl };
}

/* 정규화 크롭: 두 눈동자가 항상 같은 위치·같은 간격·수평이 되도록
   회전+확대+이동을 보정해서 저장. 모든 기록이 동일 좌표계를 갖게 되어
   전후 비교 시 눈·코·입이 정확히 겹칩니다. */
function analyzeAligned(srcCanvas, w, h, lms){
  const eA = lms[468], eB = lms[473]; // 좌우 눈동자 중심
  if(!eA || !eB) return analyzeFromSource(srcCanvas, w, h);
  // 미러 보정된 좌표계로 변환
  let p1 = { x:(1-eA.x)*w, y:eA.y*h };
  let p2 = { x:(1-eB.x)*w, y:eB.y*h };
  if(p1.x > p2.x){ const t=p1; p1=p2; p2=t; }
  const srcDist = Math.hypot(p2.x-p1.x, p2.y-p1.y);
  if(srcDist < 10) return analyzeFromSource(srcCanvas, w, h);

  // 목표: 눈동자를 (35%, 42%)와 (65%, 42%)에 고정
  const d1 = { x:S*0.35, y:S*0.42 };
  const scale = (S*0.30) / srcDist;
  const angle = Math.atan2(p2.y-p1.y, p2.x-p1.x);

  const cv = document.createElement('canvas');
  cv.width = S; cv.height = S;
  const ctx = cv.getContext('2d', {willReadFrequently:true});
  ctx.fillStyle = '#111'; ctx.fillRect(0,0,S,S);
  ctx.translate(d1.x, d1.y);
  ctx.rotate(-angle);
  ctx.scale(scale, scale);
  ctx.translate(-p1.x, -p1.y);
  ctx.drawImage(srcCanvas, 0, 0);
  ctx.setTransform(1,0,0,1,0,0);

  const metrics = analyzeImageData(ctx.getImageData(0,0,S,S));
  const dataUrl = cv.toDataURL('image/jpeg', 0.82);
  return { metrics, dataUrl };
}

let pendingCapture = null;

async function initCapture(){
  const video = $('#cam');
  const fallback = $('#camFallback');
  const shootBtn = $('#shootBtn');

  const fi = $('#fileInput');
  if(fi) fi.addEventListener('change', e=>{
    const f = e.target.files[0]; if(!f) return;
    const img = new Image();
    img.onload = ()=>{
      const r = analyzeFromSource(img, img.naturalWidth, img.naturalHeight);
      if(r.metrics) finishCapture([{ score:0, metrics:r.metrics, dataUrl:r.dataUrl }], 1);
      else toast('분석할 수 없는 이미지예요. 다시 시도해주세요.');
    };
    img.src = URL.createObjectURL(f);
  });

  let camOk = false;
  try{
    camStream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:960}, height:{ideal:1280} }, audio:false
    });
    video.srcObject = camStream;
    camOk = true;
  }catch(err){
    fallback.classList.add('show');
    shootBtn.style.display = 'none';
  }
  if(!camOk) return;

  /* ---------- 공통: 연속 촬영 후보 관리 ---------- */
  const RING_LEN = 676;
  let capturing = false;
  let candidates = [];   // {score, metrics, dataUrl} — 품질 상위 5장만 유지
  let shotsTotal = 0;
  let lastShot = 0;

  const gv = document.createElement('canvas');
  gv.width = 240; gv.height = 320;
  const gctx = gv.getContext('2d', {willReadFrequently:true});
  const capCv = document.createElement('canvas');

  const hintEl = $('#camHint');
  const ringEl = $('#progressRing');
  const setRing = p => ringEl && ringEl.setAttribute('stroke-dasharray', `${RING_LEN*p/100} ${RING_LEN}`);
  const setHint = (t, prog) => {
    if(!hintEl) return;
    hintEl.textContent = t;
    hintEl.classList.toggle('progress', !!prog);
  };

  function frameQuality(){
    if(!camStream || video.readyState < 2) return null;
    gctx.drawImage(video, 0, 0, gv.width, gv.height);
    const m = analyzeImageData(gctx.getImageData(0,0,gv.width,gv.height));
    if(!m) return null;
    const okB = m.raw.meanL > 55 && m.raw.meanL < 230;
    const okS = m.raw.lapVar > 12;
    $('#gateBright')?.classList.toggle('ok', okB);
    $('#gateSharp')?.classList.toggle('ok', okS);
    return { m, okB, okS };
  }

  function snapCandidate(lms){
    const w = video.videoWidth, h = video.videoHeight;
    if(!w || !h) return;
    capCv.width = w; capCv.height = h;
    const c = capCv.getContext('2d');
    c.setTransform(-1, 0, 0, 1, w, 0); // 미러 보정
    c.drawImage(video, 0, 0);
    c.setTransform(1, 0, 0, 1, 0, 0);
    // 눈동자 좌표가 있으면 정규화 크롭(각도·비율·위치 통일), 없으면 중앙 크롭
    const r = (lms && lms[468] && lms[473])
      ? analyzeAligned(capCv, w, h, lms)
      : analyzeFromSource(capCv, w, h);
    if(!r.metrics) return;
    shotsTotal++;
    const q = r.metrics.sharp + r.metrics.bright * 0.15; // 선명도 우선 채점
    candidates.push({ score: q, metrics: r.metrics, dataUrl: r.dataUrl });
    candidates.sort((a,b)=>b.score-a.score);
    if(candidates.length > 5) candidates.length = 5;
  }

  function doCapture(){
    if(capturing) return;
    capturing = true;
    if(gateTimer){ clearInterval(gateTimer); gateTimer = null; }
    if(candidates.length === 0) snapCandidate();
    document.getElementById('ticks')?.classList.add('done'); // 완료: 눈금 전체 초록
    const flash = $('#flash');
    if(flash){ flash.classList.add('on'); setTimeout(()=>flash.classList.remove('on'), 180); }
    if(navigator.vibrate) navigator.vibrate([40,60,40]);
    const list = candidates.slice(0, 5);
    setTimeout(()=>{
      if(list.length) finishCapture(list, shotsTotal);
      else { capturing = false; toast('촬영에 실패했어요. 다시 시도해주세요.'); }
    }, 450);
  }
  shootBtn.addEventListener('click', doCapture);

  /* ---------- 얼굴 인식 엔진 대기 (최대 4초, 실패 시 기본 모드) ---------- */
  if(!window.faceLm){
    setHint('측정 준비 중...');
    for(let i=0; i<20 && !window.faceLm; i++){
      if(view !== 'capture' || !camStream) return;
      await new Promise(r=>setTimeout(r, 200));
    }
  }
  if(window.faceLm) runFaceIdMode();
  else runBasicMode();

  /* ---------- 페이스아이디 모드 ----------
     ① 정면 확인 → ② 고개를 천천히 돌리면 그 방향의 얇은 눈금들이
     부드럽게 켜지고, 원의 80%를 채우면 자동 완료.
     정면을 지날 때마다 내부적으로 촬영해 가장 선명한 1장을 저장. */
  function runFaceIdMode(){
    document.querySelector('.gates')?.style.setProperty('display','none'); // 배지 숨김: 미니멀 유지
    const TICKS = 60, WIN = 3;        // 방향 1회 인식 시 ±3눈금(42°) 점등
    const NEED_LIT = 48;              // 60개 중 48개(80%) 켜지면 완료
    const FRONTAL_R = 0.45, ROTATE_R = 0.75; // 감도 (튜닝 가능)
    let phase = 'align';
    let alignHold = 0, sumY = 0, sumP = 0;
    let baseY = 0, baseP = 0;
    let smY = 0, smP = 0;             // 흔들림 완화용 이동평균
    const lit = new Set();
    const tickEls = document.querySelectorAll('#ticks line');

    // 힌트 깜빡임 방지: 같은 메시지가 2프레임 이상 유지될 때만 교체
    let pendMsg = '', pendCnt = 0, curMsg = '';
    function stableHint(msg, prog){
      if(msg === curMsg){ pendMsg=''; pendCnt=0; return; }
      if(msg === pendMsg) pendCnt++;
      else { pendMsg = msg; pendCnt = 1; }
      if(pendCnt >= 2 || prog){ curMsg = msg; setHint(msg, prog); pendMsg=''; pendCnt = 0; }
    }

    gateTimer = setInterval(()=>{
      if(!camStream || video.readyState < 2 || capturing) return;
      const q = frameQuality();
      if(!q) return;
      const now = Date.now();

      if(!q.okB){
        stableHint(q.m.raw.meanL <= 55 ? '조금 더 밝은 곳에서 시도해주세요' : '빛이 너무 강해요');
        return;
      }

      let lms = null;
      try{
        const res = window.faceLm.detectForVideo(video, performance.now());
        lms = res.faceLandmarks && res.faceLandmarks[0];
      }catch(e){}

      if(!lms){ stableHint('얼굴을 원 안에 맞춰주세요'); return; }

      const eyeDist = Math.hypot(lms[263].x - lms[33].x, lms[263].y - lms[33].y);
      const nose = lms[1];
      if(eyeDist < 0.13){ stableHint('조금 가까이 와주세요'); return; }
      if(eyeDist > 0.36){ stableHint('조금 멀리 떨어져주세요'); return; }
      if(Math.abs(nose.x - 0.5) > 0.17 || nose.y < 0.26 || nose.y > 0.72){
        stableHint('얼굴을 원 중앙에 맞춰주세요'); return;
      }

      // 고개 각도 근사: 좌우 볼 깊이차(좌우), 이마-턱 깊이차(상하)
      const yawP = (lms[234].z - lms[454].z) * 10;
      const pitP = (lms[10].z  - lms[152].z) * 10;

      if(phase === 'align'){
        alignHold++; sumY += yawP; sumP += pitP;
        stableHint('정면을 바라봐주세요', true);
        if(now - lastShot > 350){ snapCandidate(lms); lastShot = now; }
        if(alignHold >= 8){
          baseY = sumY/alignHold; baseP = sumP/alignHold; // 이 사용자의 정면 기준값
          phase = 'rotate';
          curMsg = '';
          if(navigator.vibrate) navigator.vibrate(30);
        }
        return;
      }

      // rotate 단계 — 이동평균으로 손떨림·인식 흔들림 완화
      smY = smY*0.55 + (yawP - baseY)*0.45;
      smP = smP*0.55 + (pitP - baseP)*0.45;
      const r = Math.hypot(smY, smP);

      if(r < FRONTAL_R && q.okS && now - lastShot > 300){
        snapCandidate(lms); lastShot = now; // 정면을 지날 때마다 촬영
      }
      if(r > ROTATE_R){
        // 화면이 거울 반전이므로 좌우를 뒤집어 사용자가 보는 방향과 일치시킴
        const deg = Math.atan2(smP, -smY) * 180/Math.PI;
        const center = Math.round(((deg + 90 + 360) % 360) / 6) % TICKS;
        let added = false;
        for(let d = -WIN; d <= WIN; d++){
          const i = (center + d + TICKS) % TICKS;
          if(!lit.has(i)){ lit.add(i); tickEls[i]?.classList.add('lit'); added = true; }
        }
        if(added && navigator.vibrate) navigator.vibrate(8);
      }

      stableHint('고개를 천천히 돌려 원을 채워주세요', true);

      if(lit.size >= NEED_LIT){
        tickEls.forEach(t=>t.classList.add('lit'));
        setHint('완료!', true);
        doCapture();
      }
    }, 100);
  }

  /* ---------- 기본 모드: 얼굴 인식 엔진을 못 불러온 환경용 ---------- */
  function runBasicMode(){
    if(ringEl) ringEl.style.display = '';
    let progress = 0;
    gateTimer = setInterval(()=>{
      if(!camStream || video.readyState < 2 || capturing) return;
      const q = frameQuality();
      if(!q) return;
      const now = Date.now();

      if(q.okB && q.okS){
        progress = Math.min(100, progress + 5);
        if(now - lastShot > 350){ snapCandidate(); lastShot = now; }
      }else{
        progress = Math.max(0, progress - 10);
      }
      setRing(progress);

      if(progress > 0 && q.okB && q.okS){
        setHint(`● 측정 중 ${progress}% · ${shotsTotal}장 분석됨`, true);
      }else if(!q.okB){
        setHint(q.m.raw.meanL <= 55 ? '조금 더 밝은 곳으로 이동해주세요' : '빛이 너무 강해요. 방향을 바꿔보세요');
      }else if(!q.okS){
        setHint('카메라를 고정하고 얼굴을 가이드에 맞춰주세요');
      }else{
        setHint('얼굴을 가이드 안에 맞춰주세요');
      }

      if(progress >= 100) doCapture();
    }, 150);
  }
}

let reviewCandidates = [];

function finishCapture(list, shots){
  if(!list || !list.length){ toast('분석할 수 없는 이미지예요. 다시 시도해주세요.'); return; }
  stopCamera();
  reviewCandidates = list;
  pendingCapture = { metrics: list[0].metrics, dataUrl: list[0].dataUrl };
  $('#camView').style.display = 'none';
  const rv = $('#review'); rv.classList.add('show');

  function paint(sel){
    const c = reviewCandidates[sel];
    pendingCapture = { metrics: c.metrics, dataUrl: c.dataUrl };
    $('#reviewImg').src = c.dataUrl;
    document.querySelectorAll('.cand-strip img').forEach((im,i)=>im.classList.toggle('sel', i===sel));
    $('#metricGrid').innerHTML = `
      <div class="mp"><div class="k">종합 점수</div><div class="v" style="color:var(--violet)">${c.metrics.score}</div></div>
      <div class="mp"><div class="k">피부톤 균일도</div><div class="v">${c.metrics.tone}</div></div>
      <div class="mp"><div class="k">질감 (모공 근사)</div><div class="v">${c.metrics.texture}</div></div>
      <div class="mp"><div class="k">선명도</div><div class="v">${c.metrics.sharp}</div></div>
    `;
  }

  $('#metricPreview').innerHTML = `
    ${reviewCandidates.length > 1 ? `
    <div style="grid-column:1/-1">
      <div class="cand-label">촬영된 ${shots}장 중 상위 ${reviewCandidates.length}장 · <b>선명도 순 자동 선택</b> (탭해서 변경 가능)</div>
      <div class="cand-strip">
        ${reviewCandidates.map((c,i)=>`<img src="${c.dataUrl}" data-ci="${i}" class="${i===0?'sel':''}" alt="후보 ${i+1} (선명도 ${c.metrics.sharp})">`).join('')}
      </div>
    </div>` : ''}
    <div style="grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:8px" id="metricGrid"></div>
  `;
  document.querySelectorAll('.cand-strip img').forEach(im=>{
    im.addEventListener('click', ()=>paint(Number(im.dataset.ci)));
  });
  paint(0);
  $('#retakeBtn').addEventListener('click', ()=>{ pendingCapture=null; render(); });
  $('#saveBtn').addEventListener('click', async function(){
    this.disabled = true; this.textContent = '저장 중...';
    try{
      await saveEntryToServer(pendingCapture.metrics, pendingCapture.dataUrl);
      pendingCapture = null;
      toast('오늘의 기록이 저장됐어요 ✓');
      go('home');
    }catch(e){
      this.disabled = false; this.textContent = '오늘 기록으로 저장';
      toast('저장에 실패했어요. 다시 시도해주세요.');
    }
  });
}

/* ========== 분석 ========== */
const METRICS = [
  {key:'score',   label:'종합'},
  {key:'tone',    label:'피부톤'},
  {key:'texture', label:'질감'},
  {key:'bright',  label:'밝기'},
  {key:'sharp',   label:'선명도'},
];
let metricSel = 'score';

function renderAnalysis(){
  const days = latestPerDay();
  if(days.length < 1){
    return `<div class="eyebrow">분석</div><h1>지표별 추세</h1>
      <div class="card empty" style="margin-top:16px"><div class="big">📈</div>기록이 쌓이면 추세가 보여요.<br>먼저 오늘의 얼굴을 기록해보세요.</div>`;
  }
  const pts = days.slice(-14);
  const vals = pts.map(e=>e.metrics[metricSel] ?? 0);
  const last = vals[vals.length-1];
  const first = vals[0];
  const diff = last - first;

  const W=340, H=150, pad=14;
  const min = Math.min(...vals)-5, max = Math.max(...vals)+5;
  const X = i => pts.length===1 ? W/2 : pad + i*(W-pad*2)/(pts.length-1);
  const Y = v => H-pad - (v-min)*(H-pad*2)/Math.max(1,(max-min));
  const line = vals.map((v,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  const area = `${line} L${X(vals.length-1)},${H-2} L${X(0)},${H-2} Z`;
  const dots = vals.map((v,i)=>`<circle cx="${X(i)}" cy="${Y(v)}" r="3.5" fill="var(--violet)" stroke="#fff" stroke-width="1.5"/>`).join('');

  return `
    <div class="eyebrow">분석</div>
    <h1>지표별 추세</h1>
    <p class="sub" style="margin:4px 0 16px">최근 ${pts.length}일 · 매일 같은 조건에서 기록할수록 추세가 정확해집니다</p>

    <div class="metric-tabs">
      ${METRICS.map(m=>`<button class="${m.key===metricSel?'on':''}" onclick="setMetric('${m.key}')">${m.label}</button>`).join('')}
    </div>

    <div class="card">
      <div class="chart-head">
        <b>${last}</b><span>/100</span>
        <span class="delta ${diff>0?'up':diff<0?'down':'flat'}" style="margin-left:auto">
          ${diff>0?`+${diff}`:diff} <span style="font-weight:500;color:var(--ink-soft)">기간 변화</span>
        </span>
      </div>
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="var(--violet)" stop-opacity=".18"/>
          <stop offset="1" stop-color="var(--violet)" stop-opacity="0"/>
        </linearGradient></defs>
        <path d="${area}" fill="url(#ag)"/>
        <path d="${line}" fill="none" stroke="var(--violet)" stroke-width="2.5" stroke-linecap="round"/>
        ${dots}
      </svg>
      <div class="axis-labels"><span>${fmtDate(pts[0].ts)}</span><span>${fmtDate(pts[pts.length-1].ts)}</span></div>
      <div class="note">지표는 촬영 이미지의 픽셀 통계로 계산되는 <b>근사 지수</b>예요. 의학적 진단이 아닌, 방향과 변화를 보기 위한 참고 지표입니다.</div>
    </div>
  `;
}
function setMetric(k){ metricSel = k; render(); }

/* ========== 전후 ========== */
function renderCompare(){
  const days = latestPerDay();
  if(days.length < 2){
    return `<div class="eyebrow">전후</div><h1>두 날짜 비교</h1>
      <div class="card empty" style="margin-top:16px"><div class="big">🪞</div>비교하려면 서로 다른 날의 기록이<br>2개 이상 필요해요.</div>`;
  }
  const opts = days.map(e=>`<option value="${e.id}">${fmtFull(e.ts)}</option>`).join('');
  return `
    <div class="eyebrow">전후</div>
    <h1>두 날짜 비교</h1>
    <p class="sub" style="margin:4px 0 16px">슬라이더를 움직여 변화를 확인하세요</p>

    <div class="compare-picks">
      <select id="pickA">${opts}</select>
      <span class="arrow">→</span>
      <select id="pickB">${opts}</select>
    </div>

    <div class="compare-stage" id="stage">
      <img id="imgA" alt="이전 기록">
      <img id="imgB" class="after-clip" alt="이후 기록">
      <div class="handle" id="handle"></div>
      <span class="lbl a">과거의 나</span><span class="lbl b">오늘의 나</span>
    </div>
    <input type="range" class="compare-range" id="slider" min="0" max="100" value="50" aria-label="비교 슬라이더">

    <div class="card delta-list" id="deltaList"></div>
  `;
}

function initCompare(){
  const days = latestPerDay();
  if(days.length < 2) return;
  const pickA = $('#pickA'), pickB = $('#pickB');
  pickA.value = days[0].id;
  pickB.value = days[days.length-1].id;

  const slider = $('#slider'), imgB = $('#imgB'), handle = $('#handle');
  slider.addEventListener('input', ()=>{
    const v = slider.value;
    imgB.style.clipPath = `inset(0 0 0 ${v}%)`;
    handle.style.left = v + '%';
  });

  function refresh(){
    const a = entries.find(e=>e.id===pickA.value);
    const b = entries.find(e=>e.id===pickB.value);
    if(!a||!b) return;
    $('#imgA').src = photoUrl(a.id);
    imgB.src = photoUrl(b.id);
    const rows = [
      ['종합 점수','score'],['피부톤 균일도','tone'],['질감 (모공 근사)','texture'],['밝기','bright'],['선명도','sharp']
    ].map(([label,k])=>{
      const d = b.metrics[k]-a.metrics[k];
      const cls = d>0?'up':d<0?'down':'flat';
      return `<div class="dl"><span>${label}</span>
        <span><b>${a.metrics[k]}</b> → <b>${b.metrics[k]}</b>
        <span class="delta ${cls}" style="margin-left:8px">${d>0?'+':''}${d}</span></span></div>`;
    }).join('');
    $('#deltaList').innerHTML = rows;
  }
  pickA.addEventListener('change', refresh);
  pickB.addEventListener('change', refresh);
  refresh();
}

/* ---------- 홈 화면 설치 ---------- */
let deferredInstall = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstall = e;           // 안드로이드/크롬: 네이티브 설치 프롬프트 보관
  const b = $('#installBanner');
  if (b && shouldShowInstall()) b.classList.add('show');
});

function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true; // iOS
}
function isIos(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}
function shouldShowInstall(){
  if (isStandalone()) return false;                          // 이미 설치됨
  if (localStorage.getItem('youth_install_dismissed')) return false;
  return isIos() || deferredInstall !== null;
}
async function installApp(){
  if (deferredInstall){
    deferredInstall.prompt();                                // 안드로이드: 바로 설치 팝업
    const { outcome } = await deferredInstall.userChoice;
    if (outcome === 'accepted'){
      $('#installBanner')?.classList.remove('show');
      toast('설치됐어요! 홈 화면에서 열어보세요 ✓');
    }
    deferredInstall = null;
  } else if (isIos()){
    $('#iosModal').classList.add('show');                    // 아이폰: 안내 모달
  }
}
function dismissInstall(){
  localStorage.setItem('youth_install_dismissed', '1');
  $('#installBanner')?.classList.remove('show');
}
function closeIosModal(){
  $('#iosModal').classList.remove('show');
}

/* ---------- 시작 ---------- */
window.go = go;
window.setMetric = setMetric;
window.installApp = installApp;
window.dismissInstall = dismissInstall;
window.closeIosModal = closeIosModal;

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

(async ()=>{
  await loadIndex();
  render();
})();
</script>
</body>
</html>
